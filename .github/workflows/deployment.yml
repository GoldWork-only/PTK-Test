name: Prove API CI/CD Windows


on:

  push:

    branches:

      - main



env:

  DOTNET_VERSION: 8.0.x

  PROJECT_PATH: Prove.API/Prove.API.csproj



jobs:


# =========================
# BUILD + UNIT TEST
# =========================

  build-test:


    runs-on: ubuntu-latest


    steps:


    - name: Checkout Repository

      uses: actions/checkout@v4



    - name: Setup .NET

      uses: actions/setup-dotnet@v4

      with:

        dotnet-version: ${{ env.DOTNET_VERSION }}



    - name: Restore

      run:

        dotnet restore Prove.slnx



    - name: Build

      run:

        dotnet build Prove.slnx -c Release



    - name: Unit Test

      run:

        dotnet test BusinessLogic.Tests/BusinessLogic.Tests.csproj -c Release





# =========================
# SECURITY TEST (NON BLOCKING)
# =========================

  security-test:


    needs: build-test


    runs-on: ubuntu-latest


    continue-on-error: true



    steps:


    - name: Checkout Repository

      uses: actions/checkout@v4



    - name: OWASP Dependency Check


      continue-on-error: true


      uses: dependency-check/Dependency-Check_Action@main


      with:


        project: Prove.API


        path: .


        format: HTML



    - name: OWASP ZAP Scan


      continue-on-error: true


      uses: zaproxy/action-baseline@v0.10.0


      with:


        target: http://localhost:5000





# =========================
# PUBLISH
# =========================

  publish:


    needs: build-test


    runs-on: ubuntu-latest



    steps:


    - name: Checkout Repository

      uses: actions/checkout@v4



    - name: Setup .NET


      uses: actions/setup-dotnet@v4


      with:


        dotnet-version: ${{ env.DOTNET_VERSION }}



    - name: Publish Application


      run: |


        dotnet publish ${{ env.PROJECT_PATH }} \
        -c Release \
        -o ./publish



    - name: Upload Artifact


      uses: actions/upload-artifact@v4


      with:


        name: prove-api


        path: publish





# =========================
# DEPLOY WINDOWS SERVER
# =========================

  deploy:


    needs:

      - publish

      - security-test



    runs-on: windows-latest



    steps:



    - name: Download Artifact


      uses: actions/download-artifact@v4


      with:


        name: prove-api


        path: publish





    - name: Deploy Using PowerShell


      shell: pwsh


      run: |


        $server="${{ secrets.WINDOWS_SERVER_HOST }}"

        $user="${{ secrets.WINDOWS_SERVER_USER }}"

        $pass="${{ secrets.WINDOWS_SERVER_PASSWORD }}"



        $securePass = ConvertTo-SecureString $pass -AsPlainText -Force



        $cred = New-Object System.Management.Automation.PSCredential(
          $user,
          $securePass
        )



        $session = New-PSSession `
        -ComputerName $server `
        -Credential $cred



        Invoke-Command `
        -Session $session `
        -ScriptBlock {


            if (!(Test-Path "C:\Users\user-test\Documents\APP")) {


                New-Item `
                -ItemType Directory `
                -Path "C:\Users\user-test\Documents\APP"


            }


        }



        Copy-Item `

        -Path "./publish/*" `

        -Destination "C:\Users\user-test\Documents\APP" `

        -ToSession $session `

        -Recurse `

        -Force





        Invoke-Command `

        -Session $session `

        -ScriptBlock {


            Restart-Service ProveAPI


        }



        Remove-PSSession $session